name: CI CD

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: todoro-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Prepare CI env files
        run: |
          cp .env.example .env
          cp .env_db.example .env_db

      - name: Run backend tests
        run: pytest -q backend/tests

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Validate Compose config
        run: docker compose config

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - component: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive image owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Prepare build arguments
        id: build_args
        env:
          PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
        run: |
          if [ "${{ matrix.component }}" = "frontend" ]; then
            api_base="${PROD_API_BASE_URL}"
            if [ -z "${api_base}" ]; then
              api_base="https://api.todo.keykomi.com"
            fi

            {
              echo "value<<EOF"
              echo "VITE_API_BASE_URL=${api_base}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/todoro/${{ matrix.component }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch,prefix=branch-
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ steps.build_args.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
